name: Build Grafana image

on:
  push:
    branches: [main]
    paths:
      - 'docker/grafana/**'
      - 'VERSION'
      - '.github/workflows/build-grafana-image.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - id: meta
        run: |
          VERSION=$(cat VERSION)
          SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: docker/grafana
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nas-observability/grafana:v${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/nas-observability/grafana:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
