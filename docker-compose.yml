# nas-observability stack — Docker Compose v2 schema (no version: key).
# Deployed via Portainer on Synology DS224+ (DSM 7.3).
# Constitutional constraints:
#   - All services run network_mode: host (DSM bridge limitations — Principle III).
#   - Pinned image tags only; no :latest (Principle I).
#   - Per-service mem_limit sums to exactly 600M (Principle IV cap): 280+140+60+30+40+50.
#     F003 trimmed cAdvisor (90→60) and node_exporter (50→30) to fund postgres_exporter (50).

services:
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    network_mode: host
    restart: unless-stopped
    mem_limit: 280M
    # Run as the DSM admin UID (1026:100 for "superman:users"). DSM 7.3
    # blocks writes from low/system UIDs (like the image's default 65534)
    # to /volume1 paths, so using the image's `nobody` user fails to
    # create TSDB files on bind-mounted state. Admin UID sidesteps it.
    user: "1026:100"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=5GB
      - --web.enable-lifecycle
      - --web.listen-address=:9090
    volumes:
      - /volume1/docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /volume1/docker/observability/prometheus/data:/prometheus

  grafana:
    image: ghcr.io/mstellaris/nas-observability/grafana:v0.2.1
    container_name: grafana
    network_mode: host
    restart: unless-stopped
    mem_limit: 140M
    # Same DSM UID restriction as Prometheus — run as 1026:100 so the
    # bind-mounted /var/lib/grafana is writable. Grafana's baked-in
    # provisioning files are world-readable (mode 644), so UID 1026
    # can still read datasources.yaml, dashboards.yaml, and dashboards/.
    user: "1026:100"
    environment:
      - GF_SERVER_HTTP_PORT=3030
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - /volume1/docker/observability/grafana/data:/var/lib/grafana

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    network_mode: host
    restart: unless-stopped
    mem_limit: 60M
    command:
      - --port=8081
      - --storage_duration=1m
      - --housekeeping_interval=30s
      - --docker_only=true
      - --disable_metrics=percpu,sched,tcp,udp,hugetlb,referenced_memory,cpu_topology,resctrl
    devices:
      - /dev/kmsg:/dev/kmsg
    cap_add:
      - SYS_ADMIN
    # Override the baked-in HEALTHCHECK which hardcodes :8080. We moved
    # cAdvisor to :8081 (mneme-caddy owns :8080 on this host), and with
    # network_mode: host the upstream check hits mneme-caddy instead of
    # cAdvisor and reports unhealthy even though the service is fine.
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      # DSM Container Manager stores Docker state at /volume1/@docker,
      # not the Linux default /var/lib/docker. Mount the real host path
      # to the conventional in-container path so cAdvisor reads Docker's
      # metadata (needed for container-name labels on metrics).
      - /volume1/@docker/:/var/lib/docker:ro
      # /dev/disk is not populated on DSM 7.3. Upstream cAdvisor recipes
      # mount it to label disk I/O metrics with physical-device names;
      # without it, per-container I/O still works, we just lose device
      # labels. Host-level disk telemetry lives under SNMP (Feature 002).

  snmp-exporter:
    image: prom/snmp-exporter:v0.28.0
    container_name: snmp-exporter
    network_mode: host
    restart: unless-stopped
    mem_limit: 40M
    # Constitution v1.1 §DSM UID restriction: run as DSM admin UID so
    # future bind-mount writes to /volume1 work without permission
    # shenanigans. snmp-exporter doesn't write to bind mounts today
    # (config is read-only), but setting user: explicitly from day one
    # avoids having to remember this later if we ever add a writable
    # mount (e.g., for snmp_exporter cache).
    user: "1026:100"
    # snmp.yml is rendered on the NAS by scripts/init-nas-paths.sh from
    # the committed template + local .community file. See plan.md
    # §Community string handling.
    volumes:
      - /volume1/docker/observability/snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    # /metrics is always exposed and returns 200 when the exporter is
    # healthy. /-/ready doesn't exist in v0.28 (added in later versions);
    # /metrics is the portable health probe across snmp_exporter versions.
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9116/metrics"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    network_mode: host
    restart: unless-stopped
    mem_limit: 30M
    command:
      - --path.rootfs=/host/root
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # rslave dropped from / mount: DSM 7.3 mounts / as private (not shared
      # or slave), which Docker refuses to combine with rslave propagation.
      # Mount topology on the NAS is stable after boot, so plain ro still
      # captures accurate filesystem metrics.
      - /:/host/root:ro

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    network_mode: host
    restart: unless-stopped
    mem_limit: 50M
    # No `user:` override: postgres_exporter is stateless (no bind mounts),
    # so the DSM /volume1 UID restriction doesn't apply. Image default is
    # fine.
    environment:
      # Connects to Mneme's Postgres on localhost:5433 (Mneme owns 5432
      # for DSM compatibility — see docs/mneme-setup.md). The metrics user
      # has pg_monitor role; reads pg_stat_* views from the system
      # `postgres` DB so we don't depend on Mneme's POSTGRES_DB value.
      # POSTGRES_METRICS_PASSWORD is set in Portainer's stack environment,
      # NOT in the repo's .env.example. See docs/mneme-setup.md §Step 3.
      - DATA_SOURCE_NAME=postgresql://mneme_metrics:${POSTGRES_METRICS_PASSWORD}@localhost:5433/postgres?sslmode=disable
    # No healthcheck: this image is distroless (no shell, no wget, no
    # curl), so a Docker healthcheck calling those binaries would fail at
    # container start. Operational health comes from Prometheus's
    # up{job="mneme-postgres"} (HTTP responding) and pg_up{} (DB
    # connection healthy) — see plan.md §Service Configuration:
    # postgres_exporter for the rationale.
